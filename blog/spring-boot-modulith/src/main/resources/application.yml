spring:
  application:
    name: ecommerce-modulith

  docker:
    compose:
      file: blog/spring-boot-modulith/compose.yml

  datasource:
    url: jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    # Run data.sql after Hibernate creates the schema
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

  modulith:
    events:
      republish-outstanding-events-on-restart: true
      # Delete completed publications immediately — prevents unbounded table growth
      completion-mode: delete
      staleness:
        # Mark events stuck in PROCESSING for 10 minutes as FAILED so they can be retried
        processing: 10m

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, modulith, beans
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    org.springframework.modulith: DEBUG
    com.example.ecommerce: INFO
