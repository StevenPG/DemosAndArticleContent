# Supporting infrastructure for BOTH order services. Start it with:
#
#   docker compose up -d --build
#
# then run the two apps on the host (see README):
#   spring-app>  ./gradlew bootRun      # or: gradle bootRun   (:8080)
#   go-app>      go run .                #                      (:8081)
#
# Everything the apps reach lives on localhost, so the Keycloak issuer
# (http://localhost:8090/realms/demo) is identical whether a token is minted
# for the inbound API or for an outbound client-credentials call. The apps run
# on the host rather than in compose specifically to keep that issuer stable
# (avoiding Keycloak's internal-vs-external hostname split). Dockerfiles for the
# apps are included for readers who want to containerize them anyway.
#
#   Postgres         orders_spring + orders_go databases      localhost:5432
#   Kafka (KRaft)    shared order-events topic                localhost:9092
#   Kafka UI         browse topics/messages                   localhost:8085
#   Keycloak         OAuth2 issuer, realm "demo"              localhost:8090
#   downstream-stub  payment + inventory APIs (JWT-validating) localhost:9095/9096
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: bitnami/kafka:3.9
    ports:
      - "9092:9092"
    environment:
      # Single-node KRaft (no ZooKeeper). Two listeners: an internal one for
      # in-compose clients, and an external one advertised as localhost:9092
      # for the apps running on the host.
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=INTERNAL://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9094,EXTERNAL://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Pin the frontend URL so issued tokens carry exactly the issuer the apps
      # and the stub validate against.
      KC_HOSTNAME: http://localhost:8090
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8090:8080"
    volumes:
      - ./keycloak/demo-realm.json:/opt/keycloak/data/import/demo-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/demo HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 20

  downstream-stub:
    build: ./downstream-stub
    ports:
      - "9095:9095"
      - "9096:9096"
    environment:
      # JWKS fetched over the compose network; issuer validated against the
      # host-facing URL the tokens actually carry.
      JWKS_URL: http://keycloak:8080/realms/demo/protocol/openid-connect/certs
      EXPECTED_ISSUER: http://localhost:8090/realms/demo
    depends_on:
      keycloak:
        condition: service_healthy
