# =============================================================================
# PostgreSQL configuration tuned for ~140MB container memory budget
# =============================================================================
# Strategy: minimize shared memory allocations, cap connections, keep WAL lean.
# The numbers below are annotated with the reasoning so you can tune further.

# -----------------------------------------------------------------------------
# CONNECTIONS
# Each idle connection costs ~5-10MB of OS memory (process + stack).
# Keep this low. Use a connection pooler (PgBouncer) in front if you need more.
# -----------------------------------------------------------------------------
max_connections = 25
superuser_reserved_connections = 3

# -----------------------------------------------------------------------------
# MEMORY
# shared_buffers  – PostgreSQL's own buffer cache.  The usual recommendation
#                   is 25% of RAM; on a 140MB budget that means ~35MB.
# work_mem        – Per-sort / per-hash memory.  Multiply by max_connections
#                   for worst-case: 25 * 2MB = 50MB.  Keep it small.
# maintenance_work_mem – Used by VACUUM, CREATE INDEX, etc.  One at a time, so
#                   we can afford a bit more than work_mem.
# huge_pages      – Requires OS config; off is safest for a VPS container.
# -----------------------------------------------------------------------------
shared_buffers = 32MB
work_mem = 2MB
maintenance_work_mem = 16MB
huge_pages = off

# -----------------------------------------------------------------------------
# WAL & CHECKPOINTS
# wal_buffers     – In-memory WAL buffer before fsync.  16MB is ample.
# min/max_wal_size – Bounds how much WAL is kept on disk between checkpoints.
# checkpoint_completion_target – Spread checkpoint I/O across this fraction of
#                   the checkpoint interval to avoid I/O spikes.
# -----------------------------------------------------------------------------
wal_buffers = 4MB
min_wal_size = 80MB
max_wal_size = 256MB
checkpoint_completion_target = 0.9

# -----------------------------------------------------------------------------
# QUERY PLANNER
# effective_cache_size – Estimate of OS page cache available.  Does NOT
#                        allocate memory; only influences the planner.
# random_page_cost     – Lower values (1.1) favour index scans, appropriate
#                        for SSDs / containerised volumes.
# -----------------------------------------------------------------------------
effective_cache_size = 128MB
random_page_cost = 1.1
effective_io_concurrency = 100

# -----------------------------------------------------------------------------
# BACKGROUND WORKERS & AUTOVACUUM
# Reduce the number of parallel workers to save memory.  On a small instance
# autovacuum is still important – don't disable it.
# -----------------------------------------------------------------------------
max_worker_processes = 2
max_parallel_workers = 2
max_parallel_workers_per_gather = 1
max_parallel_maintenance_workers = 1

autovacuum = on
autovacuum_max_workers = 1
autovacuum_vacuum_cost_delay = 20ms

# -----------------------------------------------------------------------------
# LOGGING  (useful for diagnosing slow queries on a low-resource instance)
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 500
log_line_prefix = '%t [%p] %u@%d '

# -----------------------------------------------------------------------------
# MISCELLANEOUS
# -----------------------------------------------------------------------------
dynamic_shared_memory_type = posix
