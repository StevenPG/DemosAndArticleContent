services:
  postgis:
    # Debian-based image: ships postgis_sfcgal, which the 3D solid math requires
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: airspace
      POSTGRES_PASSWORD: airspace
      POSTGRES_DB: airspace
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airspace -d airspace"]
      interval: 2s
      timeout: 2s
      retries: 30
