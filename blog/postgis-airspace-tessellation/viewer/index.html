<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AGL Airspaces over Stone Mountain — PostGIS tessellation demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.130/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.130/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <script src="config.js"></script>
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #panel {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      background: rgba(20, 24, 32, 0.88); color: #eee; border-radius: 8px;
      padding: 14px 16px; font: 13px/1.5 system-ui, sans-serif; max-width: 320px;
    }
    #panel h1 { font-size: 15px; margin: 0 0 6px; }
    #panel .sub { color: #9ab; font-size: 11px; margin-bottom: 10px; }
    #panel label { display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 4px 0; }
    #panel .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; flex: none; }
    #panel .range { color: #9ab; margin-left: auto; font-size: 11px; }
    #panel hr { border: none; border-top: 1px solid #345; margin: 10px 0; }
    #conflicts { font-size: 12px; }
    #conflicts .row { display: flex; justify-content: space-between; gap: 10px; }
    #conflicts .vol { color: #f88; }
    #hint { color: #9ab; font-size: 11px; margin-top: 6px; }
    #cellinfo { font-size: 11px; color: #cde; margin-top: 8px; white-space: pre-line; }
    #warn { color: #fc6; font-size: 11px; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="panel">
    <h1>AGL airspaces over Stone&nbsp;Mountain</h1>
    <div class="sub" id="meta">loading…</div>
    <div id="toggles"></div>
    <label><input type="checkbox" id="showConflicts" checked />
      <span class="swatch" style="background:#e15554"></span>
      highlight conflicting cells
    </label>
    <div id="modes">
      <label><input type="radio" name="mode" value="surface" checked />
        smooth volumes (floor + ceiling)</label>
      <label><input type="radio" name="mode" value="cells" />
        individual cells (the actual solids)</label>
    </div>
    <div id="hint">Check an airspace to load it.</div>
    <hr />
    <div id="conflicts"></div>
    <div id="cellinfo"></div>
    <div id="warn"></div>
  </div>

  <script>
    const CONFLICT_COLOR = "#e15554";

    async function main() {
      const warn = document.getElementById("warn");
      const data = await (await fetch("data/cells.json")).json();

      // Terrain, best available first:
      //   1. Cesium World Terrain (needs an Ion token; ellipsoidal heights,
      //      which is what the exported data is in — no adjustment)
      //   2. ESRI World Elevation, free, no key — but it serves orthometric
      //      (MSL) heights that Cesium renders as-is, so the scene's ground
      //      sits ~|geoid offset| above the ellipsoidal datum here. Shift the
      //      volumes by the same amount so they stay glued to the ground.
      //   3. Flat ellipsoid.
      const hasToken = !!(window.CESIUM_ION_TOKEN && window.CESIUM_ION_TOKEN.trim());
      let terrainProvider = null;
      let heightOffset = 0;

      if (hasToken) {
        Cesium.Ion.defaultAccessToken = window.CESIUM_ION_TOKEN.trim();
        try {
          terrainProvider = await Cesium.createWorldTerrainAsync();
        } catch (e) {
          warn.textContent = "Ion token rejected — trying free ESRI terrain instead. ";
        }
      }
      if (!terrainProvider) {
        try {
          terrainProvider = await Cesium.ArcGISTiledElevationTerrainProvider.fromUrl(
            "https://elevation3d.arcgis.com/arcgis/rest/services/WorldElevation3D/Terrain3D/ImageServer"
          );
          heightOffset = -(data.geoidOffsetM ?? 0);   // orthometric scene: +30.7 m here
          warn.textContent += "Using free ESRI World Elevation terrain " +
            `(orthometric — volumes shifted ${heightOffset.toFixed(1)} m to match).`;
        } catch (e) {
          terrainProvider = new Cesium.EllipsoidTerrainProvider();
          warn.textContent += "No terrain reachable: rendering on a flat ellipsoid, " +
            "so the volumes hover at their true heights without the mountain under them.";
        }
      }

      // Imagery: Ion world imagery with a token, otherwise free ESRI World
      // Imagery (satellite), otherwise OpenStreetMap.
      let baseLayer;
      if (hasToken && heightOffset === 0) {
        baseLayer = Cesium.ImageryLayer.fromWorldImagery();
      } else {
        try {
          baseLayer = new Cesium.ImageryLayer(
            await Cesium.ArcGisMapServerImageryProvider.fromUrl(
              "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer"
            )
          );
        } catch (e) {
          baseLayer = new Cesium.ImageryLayer(new Cesium.OpenStreetMapImageryProvider({
            url: "https://tile.openstreetmap.org/",
          }));
        }
      }

      const viewer = new Cesium.Viewer("cesiumContainer", {
        terrainProvider, baseLayer,
        animation: false, timeline: false, geocoder: false, baseLayerPicker: false,
        sceneModePicker: false, navigationHelpButton: false, homeButton: false,
        infoBox: false, selectionIndicator: false,
        requestRenderMode: true, maximumRenderTimeChange: Infinity,
      });
      viewer.scene.globe.depthTestAgainstTerrain = true;

      document.getElementById("meta").textContent =
        `${data.cellSizeM} m cells · heights in ${data.heightsAre} · generated ${data.generated}`;

      // ----------------------------------------------------------------------
      // Rendering. One batched Primitive per (airspace, style) — thousands of
      // cells collapse into a few draw calls, instead of one entity (and one
      // outline geometry) per cell, which is what crushes browsers.
      // Airspace geometry is built lazily the first time it's toggled on.
      //
      // Two modes:
      //   surface — the union look: one terrain-following ceiling sheet, one
      //             floor sheet, and walls only on the airspace perimeter
      //             (PostGIS exports which cell edges lie on the footprint
      //             boundary). No interior vertical faces at all.
      //   cells   — every prism drawn as its own translucent box, shaded
      //             darker toward the valley floor: what the solids in
      //             airspace_cells actually look like.
      // ----------------------------------------------------------------------
      const cellInfo = {};      // pick id -> info for the inspector
      const layers = {};        // airspace id -> {surface: {...}, cells: {...}}

      function cellColor(asp, cell, ground) {
        const t = (cell.ground - ground.min) / Math.max(1, ground.max - ground.min);
        return Cesium.Color.fromCssColorString(asp.color)
          .darken(0.25 * (1 - t), new Cesium.Color()).withAlpha(0.5);
      }

      function addPrimitive(instances) {
        if (!instances.length) return null;
        return viewer.scene.primitives.add(new Cesium.Primitive({
          geometryInstances: instances,
          appearance: new Cesium.PerInstanceColorAppearance({ translucent: true, closed: false }),
        }));
      }

      function boxInstance(asp, cell, idx, color) {
        return new Cesium.GeometryInstance({
          geometry: new Cesium.PolygonGeometry({
            polygonHierarchy: new Cesium.PolygonHierarchy(
              Cesium.Cartesian3.fromDegreesArray(cell.ring.flat())),
            height: cell.bottom + heightOffset,
            extrudedHeight: cell.top + heightOffset,
            vertexFormat: Cesium.PerInstanceColorAppearance.VERTEX_FORMAT,
          }),
          attributes: { color: Cesium.ColorGeometryInstanceAttribute.fromColor(color) },
          id: `${asp.id}:${idx}`,
        });
      }

      // Grid corners are shared between up to 4 cells; averaging the cells'
      // floor/ceiling values at each corner turns the per-cell stair-steps
      // into one continuous surface (adjacent cells get identical edge
      // heights, so there are no gaps and no venetian-blind striping).
      const cornerKey = (p) => `${p[0]},${p[1]}`;
      function buildCornerMap(cells) {
        const m = new Map();
        for (const cell of cells) {
          for (const p of cell.ring.slice(0, -1)) {
            const k = cornerKey(p);
            const e = m.get(k) ?? { b: 0, t: 0, n: 0 };
            e.b += cell.bottom; e.t += cell.top; e.n++;
            m.set(k, e);
          }
        }
        return m;
      }

      function sheetInstances(asp, cell, idx, color, corners) {
        // floor + ceiling only; no side walls between cells
        const heightAt = (p, fld, fallback) => {
          const e = corners.get(cornerKey(p));
          return (e ? e[fld] / e.n : fallback) + heightOffset;
        };
        return [["b", cell.bottom], ["t", cell.top]].map(([fld, fallback]) =>
          new Cesium.GeometryInstance({
            geometry: new Cesium.PolygonGeometry({
              polygonHierarchy: new Cesium.PolygonHierarchy(
                Cesium.Cartesian3.fromDegreesArrayHeights(
                  cell.ring.flatMap(p => [p[0], p[1], heightAt(p, fld, fallback)]))),
              perPositionHeight: true,
              vertexFormat: Cesium.PerInstanceColorAppearance.VERTEX_FORMAT,
            }),
            attributes: { color: Cesium.ColorGeometryInstanceAttribute.fromColor(color) },
            id: `${asp.id}:${idx}`,
          }));
      }

      function skirtInstances(asp, cell, idx, color, corners) {
        // perimeter walls, only along footprint-boundary edges
        const heightAt = (p, fld, fallback) => {
          const e = corners.get(cornerKey(p));
          return (e ? e[fld] / e.n : fallback) + heightOffset;
        };
        return (cell.edges ?? []).map(line => new Cesium.GeometryInstance({
          geometry: new Cesium.WallGeometry({
            positions: Cesium.Cartesian3.fromDegreesArray(line.flat()),
            minimumHeights: line.map(p => heightAt(p, "b", cell.bottom)),
            maximumHeights: line.map(p => heightAt(p, "t", cell.top)),
            vertexFormat: Cesium.PerInstanceColorAppearance.VERTEX_FORMAT,
          }),
          attributes: { color: Cesium.ColorGeometryInstanceAttribute.fromColor(color) },
          id: `${asp.id}:${idx}`,
        }));
      }

      function buildLayer(asp, mode) {
        const ground = {
          min: Math.min(...asp.cells.map(c => c.ground)),
          max: Math.max(...asp.cells.map(c => c.ground)),
        };
        const tagged = asp.cells.map((cell, idx) => ({ cell, idx }));
        for (const { cell, idx } of tagged) {
          cellInfo[`${asp.id}:${idx}`] = { asp, cell };
        }
        const normalCells = tagged.filter(({ cell }) => !cell.conflicts.length);
        const conflictCells = tagged.filter(({ cell }) => cell.conflicts.length);
        const red = Cesium.Color.fromCssColorString(CONFLICT_COLOR).withAlpha(0.6);

        if (mode === "cells") {
          const boxes = (list, colorOf) =>
            list.map(({ cell, idx }) => boxInstance(asp, cell, idx, colorOf(cell)));
          return {
            normal: addPrimitive(boxes(normalCells, c => cellColor(asp, c, ground))),
            conflictBase: addPrimitive(boxes(conflictCells, c => cellColor(asp, c, ground))),
            conflictRed: addPrimitive(boxes(conflictCells, () => red)),
          };
        }
        // surface mode: flat color (the sheets shade themselves via lighting)
        const base = Cesium.Color.fromCssColorString(asp.color).withAlpha(0.5);
        const corners = buildCornerMap(asp.cells);
        const sheets = (list, color) =>
          list.flatMap(({ cell, idx }) => sheetInstances(asp, cell, idx, color, corners));
        const skirts = tagged.flatMap(({ cell, idx }) => skirtInstances(asp, cell, idx, base, corners));
        return {
          normal: addPrimitive([...sheets(normalCells, base), ...skirts]),
          conflictBase: addPrimitive(sheets(conflictCells, base)),
          conflictRed: addPrimitive(sheets(conflictCells, red)),
        };
      }

      // --- UI -------------------------------------------------------------
      const toggles = document.getElementById("toggles");
      const visible = {};
      for (const asp of data.airspaces) {
        visible[asp.id] = false;   // everything off by default: instant load
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" data-id="${asp.id}" />
          <span class="swatch" style="background:${asp.color}"></span>
          ${asp.name}<span class="range">${asp.lower}–${asp.upper} m ${asp.ref}</span>`;
        toggles.appendChild(label);
      }

      document.getElementById("conflicts").innerHTML =
        `<b>Detected conflicts (PostGIS, ${data.conflictScope ?? "all pairs"})</b>` +
        (data.conflicts.map(c =>
          `<div class="row"><span>${c.pair[0]} × ${c.pair[1]}</span>` +
          `<span class="vol">${c.cellPairs} cells · ${(c.volumeM3 / 1e6).toFixed(1)} M m³</span></div>`
        ).join("") || "<div>none</div>");

      const showConflicts = document.getElementById("showConflicts");
      const currentMode = () => document.querySelector('input[name="mode"]:checked').value;

      function ensureLayer(id) {
        const mode = currentMode();
        layers[id] ??= { surface: null, cells: null };
        layers[id][mode] ??= buildLayer(data.airspaces.find(a => a.id === id), mode);
      }

      function refresh() {
        const highlight = showConflicts.checked;
        const mode = currentMode();
        for (const asp of data.airspaces) {
          for (const m of ["surface", "cells"]) {
            const layer = layers[asp.id]?.[m];
            if (!layer) continue;
            const on = visible[asp.id] && m === mode;
            if (layer.normal) layer.normal.show = on;
            if (layer.conflictBase) layer.conflictBase.show = on && !highlight;
            if (layer.conflictRed) layer.conflictRed.show = on && highlight;
          }
        }
        viewer.scene.requestRender();
      }
      toggles.addEventListener("change", (e) => {
        const id = e.target.dataset.id;
        visible[id] = e.target.checked;
        if (e.target.checked) ensureLayer(id);
        refresh();
      });
      showConflicts.addEventListener("change", refresh);
      for (const radio of document.querySelectorAll('input[name="mode"]')) {
        radio.addEventListener("change", () => {
          for (const asp of data.airspaces) if (visible[asp.id]) ensureLayer(asp.id);
          refresh();
        });
      }

      // Click a cell for its numbers (primitive picking, no entities).
      const info = document.getElementById("cellinfo");
      new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas).setInputAction((click) => {
        const picked = viewer.scene.pick(click.position);
        const hit = picked && cellInfo[picked.id];
        info.textContent = !hit ? "" :
          `${hit.asp.name} (${hit.asp.lower}–${hit.asp.upper} m ${hit.asp.ref})\n` +
          `ground ${hit.cell.ground} m · floor ${hit.cell.bottom} m · ceiling ${hit.cell.top} m\n` +
          `conflicts with: ${hit.cell.conflicts.join(", ") || "—"}`;
        viewer.scene.requestRender();
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(-84.128, 33.777, 2600),
        orientation: { heading: Cesium.Math.toRadians(-35), pitch: Cesium.Math.toRadians(-24) },
        duration: 0,
      });
    }

    main().catch((e) => {
      document.getElementById("warn").textContent = "Failed to start viewer: " + e;
      console.error(e);
    });
  </script>
</body>
</html>
